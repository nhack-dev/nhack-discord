name: Build & Release Binaries

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --no-summary

      - name: Build all platforms
        run: |
          mkdir -p dist
          bun build --compile --minify --target=bun-darwin-arm64 ./server.ts --outfile dist/nhack-discord-darwin-arm64
          bun build --compile --minify --target=bun-darwin-x64 ./server.ts --outfile dist/nhack-discord-darwin-x64
          bun build --compile --minify --target=bun-linux-x64 ./server.ts --outfile dist/nhack-discord-linux-x64
          bun build --compile --minify --target=bun-linux-arm64 ./server.ts --outfile dist/nhack-discord-linux-arm64
          bun build --compile --minify --target=bun-windows-x64 ./server.ts --outfile dist/nhack-discord-windows-x64.exe
          ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
