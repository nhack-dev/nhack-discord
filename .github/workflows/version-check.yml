name: Version Check

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version bump
        run: |
          # Get current and previous version
          CURRENT=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          PREVIOUS=$(git show HEAD~1:.claude-plugin/plugin.json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])" 2>/dev/null || echo "0.0.0")
          
          echo "Previous: $PREVIOUS"
          echo "Current:  $CURRENT"
          
          if [ "$CURRENT" = "$PREVIOUS" ]; then
            echo "❌ ERROR: plugin.json version not bumped! ($CURRENT == $PREVIOUS)"
            echo "Please update .claude-plugin/plugin.json version before pushing."
            exit 1
          fi
          
          echo "✅ Version bumped: $PREVIOUS → $CURRENT"
